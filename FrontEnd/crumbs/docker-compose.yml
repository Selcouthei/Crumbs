# ============================================================
# Crumbs Frontend - Docker Compose
# ============================================================
# DESARROLLO:
#   docker compose up          → levanta con hot-reload
#   docker compose up --build  → reconstruye (si cambiaste package.json)
#   docker compose down        → detiene todo
#
# PRODUCCIÓN:
#   docker compose -f docker-compose.yml --profile prod up --build
# ============================================================

services:
  # --- Servicio de desarrollo ---
  frontend-dev:
    build:
      context: .
      target: development
    ports:
      - "4200:4200"
    volumes:
      # Monta tu código local para hot-reload
      - .:/app
      # Evita sobreescribir node_modules del container
      - /app/node_modules
    environment:
      - NODE_ENV=development

  # --- Servicio de producción (usar con --profile prod) ---
  frontend-prod:
    build:
      context: .
      target: production
    ports:
      - "80:80"
    profiles:
      - prod
