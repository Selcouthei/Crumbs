# ============================================================
# Crumbs — Docker Compose Global
# ============================================================
# Levanta todos los servicios del proyecto con un solo comando:
#   docker compose up              → desarrollo (frontend + backend cuando esté listo)
#   docker compose up frontend     → solo frontend
#   docker compose up --build      → reconstruir todo
#   docker compose down            → detener todo
# ============================================================

services:
  # --- Frontend: Angular 21 ---
  frontend:
    build:
      context: ./FrontEnd/crumbs
      target: development
    ports:
      - "4200:4200"
    volumes:
      # Monta código local para hot-reload
      - ./FrontEnd/crumbs:/app
      # Evita sobreescribir node_modules del container
      - /app/node_modules
    environment:
      - NODE_ENV=development

